; HTTPS-proxy TLS front for the residential proxy gateway.
; Terminates TLS on :18443 and forwards the decrypted HTTP-proxy bytes to the
; local gateway on :18001. Clients (e.g. AdsPower) use proxy type = HTTPS.
foreground = yes
syslog = no
output = /var/log/stunnel-proxy-tls.log

[https-proxy]
accept = 0.0.0.0:18443
connect = 127.0.0.1:18001
cert = /etc/letsencrypt/live/【替换：你的域名】/fullchain.pem
key = /etc/letsencrypt/live/【替换：你的域名】/privkey.pem
